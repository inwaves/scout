# Scout — Configuration
# Customize your research profile, categories, and watchlist below.

anthropic_api_key: "${ANTHROPIC_API_KEY}"
state_file: "./last_run.json"

profile:
  name: "AI Safety & Agents Research"
  description: |
    I am a researcher focused on AI safety and autonomous AI agents.

    HIGH INTEREST:
    - AI safety, alignment, and controllability (especially from Anthropic,
      OpenAI, Google DeepMind, and other leading safety labs)
    - Constitutional AI, RLHF, RLAIF, reward modeling, and safe training methods
    - Agent architectures (planning, reasoning, memory, tool use)
    - Multi-agent systems and collaboration
    - LLM-based agents for software engineering and coding
    - Agent evaluation, benchmarks, and failure modes
    - Interpretability and mechanistic understanding of neural networks
    - Scalable oversight, debate, and recursive reward modeling
    - Red-teaming, adversarial robustness, and jailbreak resistance

    MODERATE INTEREST:
    - Foundation model training and scaling (pre-training, post-training)
    - Retrieval-augmented generation (RAG) architectures
    - Inference optimization (KV cache, speculative decoding, quantization)
    - Prompt engineering and in-context learning
    - Governance and policy frameworks for AI safety

    LOW INTEREST (only if groundbreaking):
    - Applications of existing AI to specific domains (medical, legal, etc.)
    - Pure computer vision without agent/reasoning/safety components
    - Speech and audio models
    - Robotics hardware

    PRIORITY AUTHORS/ORGANIZATIONS (boost score for papers from these):
    - Anthropic (Dario Amodei, Chris Olah, Jan Leike, et al.)
    - OpenAI (safety team publications)
    - Google DeepMind (safety and alignment research)
    - ARC (Alignment Research Center)
    - MIRI (Machine Intelligence Research Institute)
    - Redwood Research
    - Center for AI Safety (CAIS)

  scoring_rubric: |
    Score each paper 1-10 based on:
    - 9-10: Directly advances AI safety, alignment, agent architectures,
            or agent training. Novel contribution I would want to read today.
            Papers from Anthropic, OpenAI, or DeepMind on safety topics
            should get a score boost.
    - 7-8:  Relevant to my core interests. Noteworthy technique or result
            that connects to safety or agent research.
    - 5-6:  Tangentially related. Interesting but not directly in my lane.
    - 3-4:  Only loosely connected to my interests.
    - 1-2:  Not relevant.

arxiv:
  categories:
    - "cs.AI"    # Artificial Intelligence
    - "cs.MA"    # Multi-Agent Systems
    - "cs.CL"    # Computation and Language
    - "cs.LG"    # Machine Learning
    - "cs.SE"    # Software Engineering (for coding agents)
    - "cs.CR"    # Cryptography and Security (for adversarial/red-teaming)
  max_results_per_category: 200
  lookback_hours: 72
  max_retries: 5
  retry_backoff_seconds: 10.0
  query_pause_seconds: 10.0
  request_timeout_seconds: 60.0

web_sources:
  enabled: true
  sources:
    - type: "anthropic_alignment"
      enabled: true
    - type: "anthropic_news"
      enabled: true
    - type: "openai"
      enabled: true
    - type: "deepmind"
      enabled: true
  request_timeout_seconds: 30.0
  max_retries: 3
  retry_backoff_seconds: 5.0
  query_pause_seconds: 1.0
  max_items_per_source: 50
  fetch_page_metadata: true

scoring:
  model: "claude-sonnet-4-6"
  batch_size: 10
  threshold: 7
  max_papers: 15
  use_batch_api: false
  temperature: 0.0
  max_output_tokens: 4096
  batch_poll_interval_seconds: 5
  batch_poll_timeout_seconds: 1800
  summary_words: 150

analysis:
  deep_read_count: 3
  model: "claude-sonnet-4-6"
  temperature: 0.2
  max_output_tokens: 4096
  max_agent_turns: 4
  max_run_cost_usd: 3.0

watchlist:
  organizations:
    - name: "Anthropic"
      aliases: ["Anthropic", "anthropic.com"]
      always_include: false
    - name: "OpenAI"
      aliases: ["OpenAI", "openai.com"]
      always_include: false
    - name: "Google DeepMind"
      aliases: ["Google DeepMind", "DeepMind", "Google Brain", "deepmind.com"]
      always_include: false
  authors:
    - "Sam Bowman"
    - "Ethan Perez"
    - "Evan Hubinger"
    - "Owain Evans"

alerts:
  enabled: true
  score_threshold: 9
  watchlist_score_threshold: 8

knowledge_base:
  papers_path: "../kb/papers"
  max_topic_references: 50

feedback:
  enabled: false
  storage_path: "./feedback.sqlite3"
  public_base_url: "https://scout.your-tailnet.ts.net"
  signing_secret: "${SCOUT_FEEDBACK_SIGNING_SECRET}"
  bind_host: "127.0.0.1"
  bind_port: 8787
  max_adjustment: 1.5
  min_feature_votes: 2

delivery:
  channels:
    - type: "email"
      smtp_host: "smtp.gmail.com"
      smtp_port: 587
      smtp_username: "${SMTP_USERNAME}"
      smtp_password: "${SMTP_PASSWORD}"
      from: "${SMTP_USERNAME}"
      to: "${SCOUT_SEND_TO}"
      subject_template: "Scout Digest — {date} ({count} papers)"
    - type: "markdown"
      output_dir: "./digests"
      filename_template: "scout-{date}.md"

schedule:
  scoring_cron: "0 7 * * *"
  digest_cron: "0 7 * * 1"
