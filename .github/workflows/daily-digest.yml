name: Scout Daily Digest

on:
  schedule:
    # Daily scoring run at 7 AM UTC
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: false
        default: "daily"
        type: choice
        options:
          - "daily"
          - "weekly"
          - "daily-dry-run"
          - "weekly-dry-run"

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      KB_CLONE_URL: ${{ secrets.KB_CLONE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Clone KB repo
        if: env.KB_CLONE_URL != ''
        run: |
          git clone --depth 1 "${KB_CLONE_URL}" ../kb
          echo "KB cloned to ../kb"

      - name: Restore state
        continue-on-error: true
        uses: actions/cache@v4
        with:
          path: last_run.json
          key: scout-state-${{ github.run_id }}
          restore-keys: |
            scout-state-

      - name: Determine run mode
        id: mode
        run: |
          MODE="${{ github.event.inputs.mode || 'daily' }}"
          DOW=$(date -u +%u)
          # Auto-weekly on Mondays (day 1) for scheduled runs
          if [ "$MODE" = "daily" ] && [ "$DOW" = "1" ]; then
            MODE="weekly"
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "Running in mode: $MODE"

      - name: Run Scout
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SCOUT_SEND_TO: ${{ secrets.SCOUT_SEND_TO }}
        run: |
          MODE="${{ steps.mode.outputs.mode }}"
          case "$MODE" in
            daily)
              python -m paper_scout --config config.example.yml -v run
              ;;
            weekly)
              python -m paper_scout --config config.example.yml -v run --weekly
              ;;
            daily-dry-run)
              python -m paper_scout --config config.example.yml -v run --dry-run
              ;;
            weekly-dry-run)
              python -m paper_scout --config config.example.yml -v run --weekly --dry-run
              ;;
          esac

      - name: Push new notes to KB repo
        if: "!contains(steps.mode.outputs.mode, 'dry-run') && env.KB_CLONE_URL != ''"
        run: |
          if [ ! -d ../kb ]; then
            echo "KB repo not present; skipping."
            exit 0
          fi
          cd ../kb
          git config user.name "Scout Bot"
          git config user.email "scout[bot]@users.noreply.github.com"
          git add papers/ || true
          git diff --cached --quiet || git commit -m "📄 Scout: new paper notes $(date -u +%Y-%m-%d)"
          git pull --rebase
          git push

      - name: Commit digest and state files
        if: "!contains(steps.mode.outputs.mode, 'dry-run')"
        run: |
          git config user.name "Scout Bot"
          git config user.email "scout[bot]@users.noreply.github.com"
          git add digests/ last_run.json || true
          git diff --cached --quiet || git commit -m "📄 Scout digest $(date -u +%Y-%m-%d)"
          git push